<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Round Robin CPU Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --paper: #fdfaf4;
  --ink: #1a1208;
  --ink2: #3d3020;
  --muted: #9a8f7a;
  --border: #d4c9b0;
  --accent: #c94f1a;
  --accent2: #2a6496;
  --accent3: #2d7a3a;
  --accent4: #8b4513;
  --yellow: #e8a020;
  --surface: #fff8ee;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.12) 28px),
    repeating-linear-gradient(90deg, transparent, transparent 27px, rgba(180,160,120,0.06) 28px);
}

header {
  background: var(--ink);
  color: var(--bg);
  padding: 18px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left { display: flex; align-items: center; gap: 16px; }

.logo-box {
  width: 42px; height: 42px;
  border: 2px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0;
  line-height: 1.1;
  text-align: center;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 1px;
  color: var(--bg);
}

.header-tag {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  border: 1px solid #333;
  padding: 3px 8px;
  border-radius: 2px;
}

.container { max-width: 1140px; margin: 0 auto; padding: 28px 20px; }

.layout { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }

.card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 2px;
  box-shadow: 3px 3px 0 var(--border);
}

.card-header {
  background: var(--ink);
  color: var(--bg);
  padding: 10px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-header .bullet {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  flex-shrink: 0;
}

.card-body { padding: 18px; }

label {
  display: block;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: 2px solid var(--ink);
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 10px;
  border-radius: 0;
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 12px;
  appearance: none;
}

input:focus, select:focus {
  border-color: var(--accent);
  border-bottom-color: var(--accent);
  background: #fff;
}

.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.algo-info {
  background: var(--bg);
  border-left: 3px solid var(--accent2);
  padding: 10px 12px;
  font-size: 10px;
  color: var(--ink2);
  line-height: 1.7;
  margin-bottom: 12px;
}
.algo-info strong { color: var(--accent2); }

.quantum-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--yellow);
  padding: 12px;
  margin-bottom: 12px;
}
.quantum-box label { color: var(--yellow); }

.btn {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 0;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  margin-bottom: 8px;
  border-bottom: 3px solid #8a3010;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(201,79,26,0.3); }
.btn-primary:active { transform: translateY(1px); border-bottom-width: 1px; }

.btn-add {
  background: var(--ink);
  color: var(--bg);
  margin-bottom: 8px;
  border-bottom: 3px solid #000;
  font-size: 10px;
}
.btn-add:hover { background: var(--ink2); }

.btn-sample {
  background: transparent;
  border: 1px solid var(--accent3);
  border-bottom: 2px solid var(--accent3);
  color: var(--accent3);
  margin-bottom: 8px;
  font-size: 10px;
}
.btn-sample:hover { background: rgba(45,122,58,0.07); }

.btn-clear {
  background: transparent;
  border: 1px solid var(--border);
  border-bottom: 2px solid var(--muted);
  color: var(--muted);
  font-size: 10px;
}
.btn-clear:hover { border-color: var(--accent); color: var(--accent); }

.process-list {
  border: 1px solid var(--border);
  margin-bottom: 14px;
  max-height: 220px;
  overflow-y: auto;
}
.process-list::-webkit-scrollbar { width: 4px; }
.process-list::-webkit-scrollbar-thumb { background: var(--border); }

.ptable { width: 100%; border-collapse: collapse; font-size: 11px; }
.ptable th {
  background: var(--bg);
  padding: 7px 10px;
  text-align: center;
  font-size: 8px;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.ptable td {
  padding: 7px 10px;
  text-align: center;
  border-bottom: 1px solid rgba(212,201,176,0.5);
  color: var(--ink2);
  font-weight: 600;
}
.ptable tr:last-child td { border-bottom: none; }
.ptable tr:hover td { background: var(--bg); }

.remove-btn {
  background: none; border: none;
  color: var(--accent); cursor: pointer;
  font-size: 13px; opacity: 0.6;
  transition: opacity 0.15s;
  font-weight: bold;
}
.remove-btn:hover { opacity: 1; }

.empty-state {
  padding: 20px; text-align: center;
  color: var(--muted); font-size: 10px; letter-spacing: 1px;
}

.error-msg {
  color: var(--accent);
  font-size: 9px;
  margin-top: -8px;
  margin-bottom: 10px;
  display: none;
  letter-spacing: 0.5px;
}

/* Results */
.placeholder {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 280px; gap: 12px;
  color: var(--muted); text-align: center;
}
.placeholder-icon { font-size: 48px; opacity: 0.25; }
.placeholder-text { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }

.results-area { display: flex; flex-direction: column; gap: 0; }

.section { padding: 18px 20px; border-bottom: 1px solid var(--border); }
.section:last-child { border-bottom: none; }

.section-label {
  font-size: 8px; letter-spacing: 2px; color: var(--muted);
  text-transform: uppercase; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Gantt */
.gantt-scroll { overflow-x: auto; padding-bottom: 4px; }
.gantt-bars {
  display: flex;
  height: 52px;
  min-width: 100%;
  border: 1px solid var(--border);
  margin-bottom: 6px;
}
.gantt-bar {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  letter-spacing: 0.5px;
  border-right: 1px solid rgba(0,0,0,0.15);
  flex-shrink: 0;
  position: relative;
  cursor: default;
  transition: filter 0.15s;
}
.gantt-bar:hover { filter: brightness(1.1); }
.gantt-bar.idle {
  background: repeating-linear-gradient(45deg, #e8e0d0, #e8e0d0 3px, #d4c9b0 3px, #d4c9b0 6px);
  color: var(--muted);
  font-size: 8px;
}
.gantt-bar .tooltip {
  display: none;
  position: absolute;
  bottom: 110%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--bg);
  padding: 4px 8px;
  font-size: 9px;
  white-space: nowrap;
  border-radius: 2px;
  z-index: 10;
  pointer-events: none;
}
.gantt-bar:hover .tooltip { display: block; }

.gantt-times {
  display: flex;
  font-size: 8px;
  color: var(--muted);
  position: relative;
  height: 16px;
  min-width: 100%;
}
.gantt-time-label {
  position: absolute;
  transform: translateX(-50%);
}

/* Stats table */
.stats-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.stats-table th {
  background: var(--ink);
  color: var(--bg);
  padding: 9px 12px;
  text-align: center;
  font-size: 8px;
  letter-spacing: 1.5px;
  font-weight: 700;
  text-transform: uppercase;
}
.stats-table td {
  padding: 9px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  font-weight: 600;
}
.stats-table tr:last-child td { border-bottom: none; }
.stats-table tr:hover td { background: var(--bg); }
.wt { color: var(--accent2); font-weight: 700; }
.tat { color: var(--accent); font-weight: 700; }

.averages {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.avg-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-bottom: 3px solid var(--border);
  padding: 16px;
  text-align: center;
}
.avg-label { font-size: 8px; letter-spacing: 1.5px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.avg-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
.avg-value.wt-color { color: var(--accent2); }
.avg-value.tat-color { color: var(--accent); }
.avg-unit { font-size: 9px; color: var(--muted); margin-top: 3px; }

.comment-box {
  background: var(--bg);
  border-left: 4px solid var(--accent3);
  padding: 14px 16px;
  font-size: 11px;
  color: var(--ink2);
  line-height: 1.8;
}
.comment-box .cm-head { font-weight: 700; color: var(--accent3); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }

.tag {
  display: inline-block;
  padding: 2px 7px;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 2px;
}
.tag.rr { background: rgba(201,79,26,0.12); color: var(--accent); border: 1px solid rgba(201,79,26,0.3); }
.tag.fcfs { background: rgba(42,100,150,0.12); color: var(--accent2); border: 1px solid rgba(42,100,150,0.3); }
.tag.sjf { background: rgba(45,122,58,0.12); color: var(--accent3); border: 1px solid rgba(45,122,58,0.3); }

.quantum-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--yellow);
  color: var(--ink);
  padding: 3px 10px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-left: 8px;
}

@media (max-width: 760px) {
  .layout { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-box">RR<br>SIM</div>
    <div>
      <h1>CPU SCHEDULER</h1>
      <div style="font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px">ROUND ROBIN & MULTI-ALGORITHM SIMULATOR</div>
    </div>
  </div>
  <div class="header-tag">CS LAB / Q.4</div>
</header>

<div class="container">
  <div class="layout">

    <!-- INPUT PANEL -->
    <div class="card">
      <div class="card-header"><div class="bullet"></div>PROCESS INPUT</div>
      <div class="card-body">

        <label>Scheduling Algorithm</label>
        <select id="algo" onchange="onAlgoChange()">
          <option value="fcfs">FCFS — First Come First Serve</option>
          <option value="sjf">SJF — Shortest Job First (Non-Preemptive)</option>
          <option value="rr" selected>Round Robin (RR)</option>
        </select>

        <div class="algo-info" id="algoInfo"></div>

        <div id="quantum-section" class="quantum-box">
          <label>Time Quantum (Q)</label>
          <input type="number" id="quantum" value="2" min="1" max="99">
        </div>

        <div class="row3">
          <div>
            <label>Process ID</label>
            <input type="text" id="inp-pid" placeholder="P1" maxlength="5">
          </div>
          <div>
            <label>Arrival Time</label>
            <input type="number" id="inp-at" placeholder="0" min="0">
          </div>
          <div>
            <label>Burst Time</label>
            <input type="number" id="inp-bt" placeholder="5" min="1">
          </div>
        </div>

        <div id="error-msg" class="error-msg">⚠ Please enter valid values (BT ≥ 1, AT ≥ 0).</div>

        <div class="row2" style="margin-bottom:8px">
          <button class="btn btn-add" onclick="addProcess()">+ ADD</button>
          <button class="btn btn-sample" onclick="loadSample()">⚡ SAMPLE</button>
        </div>

        <div class="process-list">
          <table class="ptable">
            <thead>
              <tr>
                <th>PID</th><th>AT</th><th>BT</th><th></th>
              </tr>
            </thead>
            <tbody id="ptbody">
              <tr><td colspan="4"><div class="empty-state">NO PROCESSES ADDED</div></td></tr>
            </tbody>
          </table>
        </div>

        <button class="btn btn-primary" onclick="simulate()">▶ &nbsp;SIMULATE</button>
        <button class="btn btn-clear" onclick="clearAll()">CLEAR ALL</button>
      </div>
    </div>

    <!-- RESULTS PANEL -->
    <div class="card">
      <div class="card-header"><div class="bullet" style="background:var(--accent2)"></div>SIMULATION OUTPUT</div>
      <div id="results">
        <div class="placeholder">
          <div class="placeholder-icon">◎</div>
          <div class="placeholder-text">Add processes &amp; simulate</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let processes = [];
let pidCounter = 1;

const PALETTE = [
  { bg:'#c94f1a22', border:'#c94f1a', text:'#c94f1a' },
  { bg:'#2a649622', border:'#2a6496', text:'#2a6496' },
  { bg:'#2d7a3a22', border:'#2d7a3a', text:'#2d7a3a' },
  { bg:'#8b451322', border:'#8b4513', text:'#8b4513' },
  { bg:'#e8a02022', border:'#e8a020', text:'#b87010' },
  { bg:'#6a5acd22', border:'#6a5acd', text:'#6a5acd' },
  { bg:'#c0392b22', border:'#c0392b', text:'#c0392b' },
  { bg:'#16868822', border:'#168688', text:'#168688' },
];

const ALGO_INFO = {
  fcfs: '<strong>FCFS:</strong> Processes execute in arrival order. No preemption. Simple but may cause the convoy effect — short jobs stuck behind long ones.',
  sjf: '<strong>SJF (Non-Preemptive):</strong> Among available processes, the one with shortest burst time runs next. Optimal average WT, but risk of starvation for long jobs.',
  rr: '<strong>Round Robin:</strong> Each process gets a fixed time quantum. After the quantum expires, the CPU moves to the next process in the ready queue. Fair time-sharing with bounded response time.'
};

function onAlgoChange() {
  const algo = document.getElementById('algo').value;
  document.getElementById('algoInfo').innerHTML = ALGO_INFO[algo];
  document.getElementById('quantum-section').style.display = algo === 'rr' ? 'block' : 'none';
}

function addProcess() {
  const pid = document.getElementById('inp-pid').value.trim() || `P${pidCounter}`;
  const at = parseInt(document.getElementById('inp-at').value);
  const bt = parseInt(document.getElementById('inp-bt').value);
  const errEl = document.getElementById('error-msg');

  if (isNaN(at) || at < 0 || isNaN(bt) || bt < 1) {
    errEl.textContent = '⚠ Please enter valid values (BT ≥ 1, AT ≥ 0).';
    errEl.style.display = 'block'; return;
  }
  if (processes.find(p => p.pid === pid)) {
    errEl.textContent = `⚠ Process ID "${pid}" already exists.`;
    errEl.style.display = 'block'; return;
  }
  errEl.style.display = 'none';

  processes.push({ pid, at, bt, color: PALETTE[processes.length % PALETTE.length] });
  pidCounter++;
  document.getElementById('inp-pid').value = `P${pidCounter}`;
  document.getElementById('inp-at').value = '';
  document.getElementById('inp-bt').value = '';
  renderTable();
}

function removeProcess(i) { processes.splice(i, 1); renderTable(); }

function clearAll() {
  processes = []; pidCounter = 1;
  document.getElementById('inp-pid').value = 'P1';
  renderTable();
  document.getElementById('results').innerHTML = `<div class="placeholder"><div class="placeholder-icon">◎</div><div class="placeholder-text">Add processes &amp; simulate</div></div>`;
}

function renderTable() {
  const tbody = document.getElementById('ptbody');
  if (!processes.length) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state">NO PROCESSES ADDED</div></td></tr>';
    return;
  }
  tbody.innerHTML = processes.map((p, i) => `
    <tr>
      <td style="color:${p.color.text};font-weight:700">${p.pid}</td>
      <td>${p.at}</td>
      <td>${p.bt}</td>
      <td><button class="remove-btn" onclick="removeProcess(${i})">✕</button></td>
    </tr>`).join('');
}

// ── Scheduling algorithms ──────────────────────────────────────────

function runFCFS(procs) {
  let sorted = [...procs].sort((a,b) => a.at - b.at || a.pid.localeCompare(b.pid));
  let time = 0, gantt = [], done = [];
  for (let p of sorted) {
    if (time < p.at) { gantt.push({pid:'IDLE',start:time,end:p.at}); time=p.at; }
    gantt.push({pid:p.pid,start:time,end:time+p.bt,color:p.color});
    done.push({...p, start:time, finish:time+p.bt, wt:time-p.at, tat:time+p.bt-p.at});
    time += p.bt;
  }
  return { gantt, done };
}

function runSJF(procs) {
  let remaining = [...procs], time = 0, gantt = [], done = [];
  while (remaining.length) {
    let avail = remaining.filter(p => p.at <= time);
    if (!avail.length) {
      let next = Math.min(...remaining.map(p=>p.at));
      gantt.push({pid:'IDLE',start:time,end:next}); time=next; continue;
    }
    avail.sort((a,b)=>a.bt-b.bt||a.at-b.at);
    let p = avail[0];
    remaining = remaining.filter(r=>r.pid!==p.pid);
    gantt.push({pid:p.pid,start:time,end:time+p.bt,color:p.color});
    done.push({...p,start:time,finish:time+p.bt,wt:time-p.at,tat:time+p.bt-p.at});
    time += p.bt;
  }
  return { gantt, done };
}

function runRR(procs, quantum) {
  // Build queue in arrival order; track remaining burst
  let remaining = [...procs].map(p=>({...p, rem:p.bt, first:true}));
  remaining.sort((a,b)=>a.at-b.at);

  let queue = [];
  let time = 0;
  let gantt = [];
  let done = [];
  let finishMap = {};
  let firstRunMap = {};
  let arrived = new Set();

  // Enqueue processes that arrive at time 0
  for (let p of remaining) {
    if (p.at <= time && !arrived.has(p.pid)) { queue.push(p); arrived.add(p.pid); }
  }

  let safetyLimit = 0;

  while (queue.length > 0 || remaining.filter(p=>!arrived.has(p.pid)).length > 0) {
    safetyLimit++;
    if (safetyLimit > 10000) break; // prevent infinite loop

    if (queue.length === 0) {
      // CPU idle — jump to next arrival
      let nextAT = Math.min(...remaining.filter(p=>!arrived.has(p.pid)).map(p=>p.at));
      gantt.push({pid:'IDLE',start:time,end:nextAT});
      time = nextAT;
      for (let p of remaining) {
        if (p.at <= time && !arrived.has(p.pid)) { queue.push(p); arrived.add(p.pid); }
      }
      continue;
    }

    let p = queue.shift();
    let runTime = Math.min(quantum, p.rem);
    let start = time;
    time += runTime;
    p.rem -= runTime;

    gantt.push({pid:p.pid, start, end:time, color:p.color});

    // Newly arrived during this slice
    for (let other of remaining) {
      if (other.at > start && other.at <= time && !arrived.has(other.pid)) {
        queue.push(other);
        arrived.add(other.pid);
      }
    }

    if (p.rem > 0) {
      queue.push(p); // re-queue
    } else {
      finishMap[p.pid] = time;
      done.push({
        ...p,
        finish: time,
        wt: time - p.bt - p.at,
        tat: time - p.at
      });
    }
  }

  return { gantt, done };
}

// ── Simulate ───────────────────────────────────────────────────────

function simulate() {
  if (!processes.length) { alert('Add at least one process.'); return; }
  const algo = document.getElementById('algo').value;
  const quantum = parseInt(document.getElementById('quantum').value) || 2;

  let result;
  if (algo === 'fcfs') result = runFCFS(processes);
  else if (algo === 'sjf') result = runSJF(processes);
  else result = runRR(processes, quantum);

  renderResults(result, algo, quantum);
}

// ── Render Results ─────────────────────────────────────────────────

function renderResults({ gantt, done }, algo, quantum) {
  const totalTime = gantt[gantt.length-1].end;
  const avgWT = (done.reduce((s,p)=>s+p.wt,0)/done.length).toFixed(2);
  const avgTAT = (done.reduce((s,p)=>s+p.tat,0)/done.length).toFixed(2);

  const algoLabel = { fcfs:'FCFS', sjf:'SJF', rr:'ROUND ROBIN' };
  const tagCls = { fcfs:'fcfs', sjf:'sjf', rr:'rr' };

  // Merge consecutive identical IDLE for cleaner display
  let mergedGantt = [];
  for (let g of gantt) {
    if (mergedGantt.length && mergedGantt[mergedGantt.length-1].pid === g.pid && g.pid==='IDLE') {
      mergedGantt[mergedGantt.length-1].end = g.end;
    } else {
      mergedGantt.push({...g});
    }
  }

  // Gantt bars — use fixed min-width for narrow slices
  const minBarPx = 30;
  const totalSlices = mergedGantt.length;
  const barsHtml = mergedGantt.map(g => {
    const dur = g.end - g.start;
    const pct = Math.max((dur / totalTime * 100), 3);
    if (g.pid === 'IDLE') {
      return `<div class="gantt-bar idle" style="flex:${pct}" title="IDLE [${g.start}–${g.end}]">
        <div class="tooltip">IDLE: ${g.start}→${g.end}</div>
        ${dur > 1 ? 'IDLE' : ''}
      </div>`;
    }
    return `<div class="gantt-bar" style="flex:${pct};background:${g.color.bg};color:${g.color.text};border-top:2px solid ${g.color.border}">
      <div class="tooltip">${g.pid}: ${g.start}→${g.end} (${dur}u)</div>
      ${g.pid}
    </div>`;
  }).join('');

  // Time labels — show all unique times
  const uniqueTimes = [...new Set(mergedGantt.flatMap(g=>[g.start,g.end]))].sort((a,b)=>a-b);
  const timeLabelsHtml = uniqueTimes.map(t => {
    const pct = (t / totalTime * 100).toFixed(2);
    return `<span class="gantt-time-label" style="left:${pct}%">${t}</span>`;
  }).join('');

  // Stats table
  const rowsHtml = done.map(p => `
    <tr>
      <td style="color:${p.color.text};font-weight:700">${p.pid}</td>
      <td>${p.at}</td>
      <td>${p.bt}</td>
      <td>${p.finish}</td>
      <td class="wt">${p.wt}</td>
      <td class="tat">${p.tat}</td>
    </tr>`).join('');

  // Comment
  let commentHtml = '';
  if (algo === 'rr') {
    const maxWT = Math.max(...done.map(p=>p.wt));
    const minWT = Math.min(...done.map(p=>p.wt));
    commentHtml = `
      <div class="comment-box">
        <div class="cm-head">// Analysis: Round Robin (Q = ${quantum})</div>
        <strong>Time Quantum Effect:</strong> With Q=${quantum}, each process is allowed to run for at most ${quantum} time unit(s) before being preempted and re-queued. 
        This ensures <em>fairness</em> — no process monopolises the CPU.<br><br>
        <strong>Observed:</strong> Avg WT = <strong style="color:var(--accent2)">${avgWT}</strong> units. 
        The spread between fastest WT (${minWT}) and slowest WT (${maxWT}) shows how quantum size impacts fairness.<br><br>
        <strong>Quantum trade-off:</strong> A <em>smaller quantum</em> improves responsiveness and reduces starvation risk but increases context-switch overhead. 
        A <em>larger quantum</em> reduces overhead but degrades response time and approaches FCFS behaviour. 
        The optimal quantum is typically slightly larger than the average CPU burst to balance both concerns.
      </div>`;
  } else if (algo === 'fcfs') {
    commentHtml = `<div class="comment-box"><div class="cm-head">// Analysis: FCFS</div>Processes executed in strict arrival order. No preemption. Simple and fair but susceptible to the <strong>convoy effect</strong> — short processes queue behind long ones, inflating average waiting time.</div>`;
  } else {
    commentHtml = `<div class="comment-box"><div class="cm-head">// Analysis: SJF</div>Shortest available burst is always selected next. Theoretically <strong>optimal average WT</strong> for non-preemptive scheduling. However long processes risk <strong>starvation</strong> if short jobs continuously arrive.</div>`;
  }

  const qBadge = algo === 'rr' ? `<span class="quantum-badge">Q = ${quantum}</span>` : '';

  document.getElementById('results').innerHTML = `
    <div class="results-area">

      <div class="section">
        <div class="section-label">Gantt Chart &nbsp;<span class="tag ${tagCls[algo]}">${algoLabel[algo]}</span>${qBadge}</div>
        <div class="gantt-scroll">
          <div class="gantt-bars" style="min-width:${Math.max(mergedGantt.length*minBarPx, 300)}px">${barsHtml}</div>
          <div class="gantt-times" style="min-width:${Math.max(mergedGantt.length*minBarPx, 300)}px">${timeLabelsHtml}</div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Process Statistics</div>
        <table class="stats-table">
          <thead><tr>
            <th>PID</th><th>AT</th><th>BT</th><th>CT</th>
            <th>WT</th><th>TAT</th>
          </tr></thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>

      <div class="section">
        <div class="section-label">Averages</div>
        <div class="averages">
          <div class="avg-card">
            <div class="avg-label">Avg Waiting Time</div>
            <div class="avg-value wt-color">${avgWT}</div>
            <div class="avg-unit">time units</div>
          </div>
          <div class="avg-card">
            <div class="avg-label">Avg Turnaround Time</div>
            <div class="avg-value tat-color">${avgTAT}</div>
            <div class="avg-unit">time units</div>
          </div>
        </div>
      </div>

      <div class="section">${commentHtml}</div>

    </div>`;
}

// ── Sample Data ────────────────────────────────────────────────────

    {pid:'P1',at:0,bt:5},{pid:'P2',at:1,bt:3},

  ],
  fcfs: [
    {pid:'P1',at:0,bt:7},{pid:'P2',at:2,bt:3},
    {pid:'P3',at:4,bt:5},{pid:'P4',at:6,bt:2}
  ],
  sjf: [
    {pid:'P1',at:0,bt:6},{pid:'P2',at:1,bt:2},
    {pid:'P3',at:2,bt:8},{pid:'P4',at:3,bt:3},{pid:'P5',at:4,bt:1}
  ]
};

  const algo = document.getElementById('algo').value;
  processes = SAMPLES[algo].map((p,i)=>({...p, color:PALETTE[i%PALETTE.length]}));
  pidCounter = processes.length + 1;
  document.getElementById('inp-pid').value = `P${pidCounter}`;
  document.getElementById('inp-at').value = '';
  document.getElementById('inp-bt').value = '';
  renderTable();
}

onAlgoChange();
